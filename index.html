<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Preface HR Assistant Chatbot</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
    }

    #chat-container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Customize chat header */
    .chat-header {
      background-color: #004080;
      color: #fff;
      padding: 1rem;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background-color: #ffffff;
    }

    /* Input area */
    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 0.5rem;
      background-color: #fafafa;
    }

    .chat-input input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    .chat-input button {
      margin-left: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #004080;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    .chat-input button:hover {
      background-color: #0059b3;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div class="chat-header">Preface HR Assistant</div>
    <div id="n8n-chat" class="chat-area"></div>
    <div class="chat-input">
      <input id="chat-message" type="text" placeholder="Ask about HR policies..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Load @n8n/chat -->
  <script src="https://unpkg.com/@n8n/chat"></script>
  <script>
    // Initialize n8n chat
    const chat = new N8NChat({
      webhookUrl: 'https://sammy123456.app.n8n.cloud/webhook/cdc0e91b-b40e-4983-9825-3d4e95bd5b34/chat', // Replace with your n8n webhook URL
      target: "#n8n-chat",
      enableStreaming: false, // Required by your spec
      botName: "Preface HR Assistant",
      initialMessage: "Hello! I’m your HR Assistant. How can I help you today?",
      theme: {
        primaryColor: "#004080",
        secondaryColor: "#0059b3",
        backgroundColor: "#ffffff",
        textColor: "#333333",
        userMessageBubbleColor: "#e6f0ff",
        botMessageBubbleColor: "#f5f5f5",
      },
      avatar: {
        bot: "https://cdn-icons-png.flaticon.com/512/4712/4712109.png", // Example HR bot avatar
        user: "https://cdn-icons-png.flaticon.com/512/847/847969.png", // Example user avatar
      },
      inputPlaceholder: "Type your HR question...",
      sendButtonLabel: "Send",
    });

    // Hook up custom input box
    const input = document.getElementById("chat-message");
    const sendBtn = document.getElementById("send-btn");

    sendBtn.addEventListener("click", () => {
      const message = input.value.trim();
      if (message) {
        chat.sendMessage(message);
        input.value = "";
      }
    });

    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendBtn.click();
      }
    });
  </script>
</body>
